<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Css/style.css">
    <title>Lévitad</title>
</head>
<body>
    <header id="header" style="--p: 0;"> <div class="header-container">
        <div class="logo-area">
            <div class="logo-wrapper">
                <h1>LÉVIT
                    <span class="logo-a">A
                        <svg class="halo-icon" viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <filter id="halo-glow" x="-50%" y="-50%" width="200%" height="200%">
                                    <feGaussianBlur stdDeviation="1.5" result="blur"/>
                                    <feFlood class="halo-glow-color" result="glow-color"/>
                                    <feComposite in="glow-color" in2="blur" operator="in" result="colored-blur"/>
                                    <feMerge>
                                        <feMergeNode in="colored-blur"/>
                                        <feMergeNode in="SourceGraphic"/>
                                    </feMerge>
                                </filter>
                            </defs>
                            <path class="halo-path" d="M20,25 A30,12 0 1,1 75,22" fill="none" stroke-width="8" stroke-linecap="round" filter="url(#halo-glow)" />
                        </svg>
                    </span>
                    D
                </h1>
            </div>
            <nav class="header-nav">
                <ul>
                    <li>PRODUCTOS</li>
                    <li>COLECCIONES</li>
                    <li>ENCARGUES</li>
                    <li>CONTACTO</li>
                </ul>
            </nav>
        </div>
        <div class="iconos-container">
            <button id="buscar-btn" class="btn-buscar" aria-label="Abrir búsqueda">
                <svg id="search-icon" class="icon-search is-visible" width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
                    <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <span class="carrito-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" id="carrito-btn" viewBox="0 0 24 24">
                    <path d="m23.918,4H4.49l-.256-1.843c-.17-1.229-1.234-2.157-2.476-2.157H0v1h1.759c.745,0,1.383.556,1.485,1.294l2.021,14.549c.17,1.229,1.234,2.157,2.476,2.157h12.259v-1H7.741c-.745,0-1.383-.556-1.485-1.294l-.237-1.706h15.699l2.2-11ZM5.88,14l-1.25-9h18.068l-1.8,9H5.88Zm1.12,6c-1.103,0-2,.897-2,2s.897,2,2,2,2-.897,2-2-.897-2-2-2Zm0,3c-.552,0-1-.449-1-1s.448-1,1-1,1,.449,1,1-.448,1-1,1Zm10-3c-1.103,0-2,.897-2,2s.897,2,2,2,2-.897,2-2-.897-2-2-2Zm0,3c-.552,0-1-.449-1-1s.448-1,1-1,1,.449,1,1-.448,1-1,1Z"/>
                </svg>
                <span class="carrito-badge">0</span>
            </span>
            
            <svg id="menu-hamb" width="50" height="50" viewBox="0 0 50 50">
                <g fill="#caac47" filter="url(#premium-glow)">
                    <rect class="bar-1" x="10" y="15" width="30" height="4" rx="2" />
                    <rect class="bar-2" x="10" y="25" width="30" height="4" rx="2" />
                    <rect class="bar-3" x="10" y="35" width="30" height="4" rx="2" />
                </g>
            </svg>
        </div>
    </div>
</header>
    <div id="search-bar" class="search-bar-container">
        <div class="search-bar-content">
            <input 
                type="text" 
                id="search-input" 
                class="search-input" 
                placeholder="Buscar por nombre..." 
                autocomplete="off"
            />
            <button id="search-submit-btn" class="search-submit" aria-label="Buscar">
                <svg class="search-submit-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <button id="filter-btn" class="filter-btn" aria-label="Filtrar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 6h18M6 12h12M9 18h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </div>
    <div class="switch-container">
                <div class="color-switch"></div>
                <button>En Stack</button>
                <button>Encargue!!</button>
            </div>
    <main class="contenedor">
        <div class="grid-productos" id="grid-productos">
            <div class="grid-sizer"></div>
            <div class="gutter-sizer"></div>
            <!-- Productos cargados dinamicamente desde datos/datos.json -->
        </div>
    </main>
    <div id="modal-producto" class="modal-overlay">
    <div class="modal-sheet">
        <div class="modal-indicator"></div>
        <button class="btn-cerrar-modal">✕</button>
        
        <div class="modal-scroll-area">
            <div class="modal-imagen-container">
                <div id="modal-img" class="modal-img-bg"></div>
            </div>

            <div class="modal-body">
                <h2 id="modal-titulo">Detalles del producto</h2>
                <span id="modal-precio" class="precio-modal">$0</span>
                <div class="modal-especificaciones">
                    <ul id="modal-detalles" class="modal-detalles-lista"></ul>
                </div>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-comprar-ahora">Añadir al Pedido</button>
        </div>
    </div>
</div>
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    <script src="js/js.js"></script>
</body>
</html>
